<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ecom Products</title>

    <style>
        .product-card{
            border: 1px solid silver;
            border-radius: 10px;
            color: black;
            background-color: antiquewhite;
            padding: 10px;
            margin-bottom: 20px;
            width: 200px;
        }

        #products{
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 100px;
        }
    </style>

</head>
<body>
    <h1>Product List</h1>
    <button onclick="loadProduct()">Load Product</button>

    <h2>Add Product</h2>
    <input id="nameInput" placeholder="Name">
    <input id="descInput" placeholder="Description">
    <input id="brandInput" placeholder="Brand">
    <input id="priceInput" placeholder="Price">
    <input id="categoryInput" placeholder="Category">
    <input id="releaseDateInput" placeholder="Release Date">
    <input id="availabilityInput" placeholder="Availability">
    <input id="quantityInput" placeholder="Quantity">
    <button onclick="addProduct()">Add Product</button>
    <div id="products"></div>

    <script src="script.js"></script>

</body>
</html>
